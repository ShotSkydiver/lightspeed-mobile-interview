version: '3.8'

name: mobile-interview-takehome

services:
  # Mock API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api2
    command: npm run server
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=3001
    networks:
      - todo-network
    restart: unless-stopped

  # Expo Dev Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app
    command: npm run web
    ports:
      - "8081:8081"   # Metro bundler
      - "19000:19000" # Expo DevTools
      - "19001:19001" # Expo DevTools
      - "19002:19002" # Expo DevTools
      - "19006:19006" # Expo Web
    volumes:
      - ./src:/app/src
      - ./App.tsx:/app/App.tsx
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
      - NODE_ENV=development
    networks:
      - todo-network
    depends_on:
      - api
    stdin_open: true
    tty: true

networks:
  todo-network:
    driver: bridge
